version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: erp-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-test-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - erp-test-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: erp-test-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-test-data:/data
    networks:
      - erp-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: erp-test-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /erp
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-test-data:/var/lib/rabbitmq
    networks:
      - erp-test-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Nacos
  nacos:
    image: nacos/nacos-server:v2.4.0
    container_name: erp-test-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      PREFER_HOST_MODE: hostname
      JVM_XMS: 512m
      JVM_XMX: 512m
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-test-data:/home/nacos/data
      - nacos-test-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - erp-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Sentinel
  sentinel:
    image: bladex/sentinel-dashboard:1.8.7
    container_name: erp-test-sentinel
    ports:
      - "8858:8858"
      - "8719:8719"
    networks:
      - erp-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8858/#/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Gateway
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: erp-test-gateway
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel:8858
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      sentinel:
        condition: service_healthy
    networks:
      - erp-test-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 订单服务
  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.order
    container_name: erp-test-order-service
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel:8858
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - erp-test-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 平台服务
  platform-service:
