server:
  port: 8091

spring:
  application:
    name: erp-product-description-service
  data:
    redis:
      host: localhost
      port: 6379
      database: 3
      timeout: 3000

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# LLM API配置（统一配置）
llm:
  enabled: ${LLM_ENABLED:false}
  api-key: ${LLM_API_KEY:${DEEPSEEK_API_KEY:${OPENAI_API_KEY:}}}
  base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
  model: ${LLM_MODEL:deepseek-chat}
  timeout: ${LLM_TIMEOUT:30000}
  max-tokens: ${LLM_MAX_TOKENS:2000}
  temperature: ${LLM_TEMPERATURE:0.7}
  provider: ${LLM_PROVIDER:deepseek}

# 描述生成配置
description:
  # 模板配置
  templates:
    amazon:
      name: Amazon产品模板
      max-length: 2000
    ebayer:
      name: eBay产品模板
      max-length: 1500
    shopee:
      name: Shopee产品模板
      max-length: 2000
    general:
      name: 通用产品模板
      max-length: 2500

  # SEO配置
  seo:
    enabled: true
    auto-optimize: true
    keyword-density-threshold: 2.0
    readability-target: 70

  # A/B测试配置
  ab-test:
    enabled: true
    max-versions: 3
    auto-select-best: false

# 应用配置
app:
  name: 产品描述生成服务
  version: 1.5.0
  author: 火球鼠
